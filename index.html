<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghostcode Labs | Underground Engineering & AI</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131c2e;
            --accent-color: #00ffcc;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #1f293d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 24px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        .badge {
            font-size: 12px;
            background: rgba(0, 255, 204, 0.1);
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            text-transform: uppercase;
            font-weight: 600;
        }

        .hero-section {
            margin-bottom: 30px;
        }

        .hero-section h2 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 12px;
            color: #ffffff;
            line-height: 1.2;
        }

        .hero-section p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 20px;
        }

        .action-link {
            display: inline-block;
            background: var(--accent-color);
            color: #0b0f19;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            text-decoration: none;
            transition: opacity 0.2s ease;
        }

        .action-link:hover {
            opacity: 0.85;
        }

        .image-container {
            width: 100%;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-top: 20px;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        footer {
            margin-top: 30px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <span class="logo-icon">⚡</span>
                <h1>GHOSTCODE LABS</h1>
            </div>
            <div class="badge">Active Node</div>
        </header>

        <section class="hero-section">
            <p style="color: var(--accent-color); font-weight: 600; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; margin-bottom: 8px;">Underground Engineering & AI</p>
            <h2>Built for Minds Who Build</h2>
            <p>No fluff. Deep technical investigations, autonomous system architectures, and raw project breakdowns for high-performance builders.</p>
            <a href="#" class="action-link">Deploy Systems &rarr;</a>
        </section>

        <div class="image-container">
            <!-- Replace or keep your image source below -->
            <img src="https://images.unsplash.com/photo-1544197150-b99a580bb7a8?auto=format&fit=crop&w=1200&q=80" alt="Engineering Infrastructure">
        </div>

        <footer>
            &copy; 2026 Ghostcode Labs. All rights reserved.
        </footer>
    </div>

</body>
</html>
